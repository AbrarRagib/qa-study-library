name: Build PDF index

# Whenever you add or remove a PDF in /pdfs and push, this rebuilds
# pdfs/index.json so the site's list stays in sync automatically.
# You never edit the list by hand.

on:
  push:
    branches: [main]
    paths:
      - "pdfs/**"
      - ".github/workflows/build-index.yml"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write

concurrency:
  group: build-index
  cancel-in-progress: false

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate pdfs/index.json
        run: |
          python3 - <<'PY'
          import json, glob, os
          os.makedirs("pdfs", exist_ok=True)
          files = sorted(
              (os.path.basename(p) for p in glob.glob("pdfs/*.pdf")),
              key=str.lower,
          )
          with open("pdfs/index.json", "w") as f:
              json.dump({"files": files, "count": len(files)}, f, indent=2)
          print(f"Indexed {len(files)} PDF(s):")
          for name in files:
              print("  -", name)
          PY

      - name: Commit index.json if it changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pdfs/index.json
          if git diff --cached --quiet; then
            echo "index.json already up to date — nothing to commit."
          else
            git commit -m "chore: auto-update pdfs/index.json"
            git push
          fi
