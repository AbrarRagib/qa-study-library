<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QA Study Library</title>
<meta name="description" content="A reading room for QA & software testing study guides." />

<!-- ============================================================= -->

<script>
  const CONFIG = {
    siteTitle: "QA Study Library",
    tagline: "Viva & interview prep",

    // Leave blank to auto-detect from the page URL (username.github.io/repo).
    owner: "",
    repo: "",

    // Folder that holds the PDFs, relative to index.html.
    // "" means "same folder as index.html". Use "pdfs" if you keep them in a /pdfs folder.
    pdfDir: "",

    // Fallback list, used only if auto-detection fails (e.g. opening the file locally).
    // Each item is just a filename. Titles & categories are worked out automatically.
    // NOTE: one name in your screenshot was cut off — double-check
    // "Software_Development_Methodologies.pdf" matches your real filename.
    manualList: [
      "1_SQA_Theory_and_Viva_Guide.pdf",
      "2_DSA_Master_Handbook.pdf",
      "3_Python_From_Scratch_and_DSA.pdf",
      "4_Rust_Complete_Guide.pdf",
      "Abrar_Ragib_SQA_CV.pdf",
      "API-Testing-Viva-Prep-Guide.pdf",
      "API-Testing-Viva-Prep-Guide_1.pdf",
      "CICD-Git-Viva-Prep-Guide.pdf",
      "istqb_ctfl_prep.pdf",
      "JMeter-Performance-Viva-Prep-Guide.pdf",
      "playwright_documentation.pdf",
      "Playwright-Viva-Prep-Guide.pdf",
      "Selenium-Viva-Prep-Guide.pdf",
      "Software_Development_Methodologies.pdf",
      "SQA-A-to-Z-Complete-Theory-Guide.pdf",
      "Ultimate-Security-Testing-Interview-Guide-Vol1"
    ]
  };
</script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root{
    --ink:#14171E;
    --ink-1:#1A1E27;
    --ink-2:#212734;
    --ink-3:#272E3C;
    --line:#2C3342;
    --line-soft:#232A36;
    --paper:#EDEBE4;
    --fg:#EAEDF3;
    --fg-dim:#9AA4B4;
    --fg-mute:#6B7385;
    --accent:#34D399;
    --accent-ink:#0B3B2B;
    --accent-dim:rgba(52,211,153,.12);
    --accent-line:rgba(52,211,153,.35);
    --amber:#F6C453;
    --sidebar-w:328px;
    --topbar-h:60px;
    --radius:9px;
    font-synthesis:none;
    -webkit-text-size-adjust:100%;
  }

  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    background:var(--ink);
    color:var(--fg);
    font-family:"Inter",system-ui,-apple-system,sans-serif;
    font-size:14px;
    line-height:1.5;
    overflow:hidden;
  }
  .mono{font-family:"JetBrains Mono",ui-monospace,monospace}
  button{font-family:inherit;color:inherit;cursor:pointer}
  a{color:inherit}

  .app{
    display:grid;
    grid-template-columns:var(--sidebar-w) 1fr;
    height:100vh;
    height:100dvh;
  }

  /* ---------------- Sidebar ---------------- */
  .side{
    grid-column:1;
    background:var(--ink-1);
    border-right:1px solid var(--line);
    display:flex;
    flex-direction:column;
    min-height:0;
    z-index:40;
  }
  .brand{
    padding:18px 20px 14px;
    border-bottom:1px solid var(--line-soft);
  }
  .brand-row{display:flex;align-items:center;gap:11px}
  .mark{
    width:32px;height:32px;flex:none;border-radius:8px;
    background:var(--accent-dim);
    border:1px solid var(--accent-line);
    display:grid;place-items:center;
  }
  .mark svg{width:17px;height:17px}
  .brand h1{
    font-family:"Space Grotesk",sans-serif;
    font-weight:700;font-size:16px;letter-spacing:-.01em;margin:0;line-height:1.1;
  }
  .brand .sub{
    font-size:11px;color:var(--fg-mute);margin-top:1px;letter-spacing:.02em;
  }
  .status{
    margin-top:13px;font-size:11px;color:var(--fg-dim);
    display:flex;align-items:center;gap:7px;
  }
  .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex:none;
    box-shadow:0 0 0 3px var(--accent-dim)}
  .status.err .dot{background:var(--amber);box-shadow:0 0 0 3px rgba(246,196,83,.15)}

  .search{
    padding:12px 16px;border-bottom:1px solid var(--line-soft);
  }
  .search-box{
    position:relative;display:flex;align-items:center;
  }
  .search-box svg{
    position:absolute;left:11px;width:14px;height:14px;color:var(--fg-mute);pointer-events:none;
  }
  .search input{
    width:100%;padding:9px 30px 9px 32px;
    background:var(--ink);
    border:1px solid var(--line);
    border-radius:8px;color:var(--fg);font-size:13px;outline:none;
    transition:border-color .15s,box-shadow .15s;
  }
  .search input::placeholder{color:var(--fg-mute)}
  .search input:focus{border-color:var(--accent-line);box-shadow:0 0 0 3px var(--accent-dim)}
  .clear-x{
    position:absolute;right:8px;border:0;background:none;color:var(--fg-mute);
    padding:4px;line-height:0;border-radius:5px;display:none;
  }
  .clear-x:hover{color:var(--fg);background:var(--ink-2)}
  .clear-x.on{display:inline-flex}

  .list{
    flex:1;overflow-y:auto;overscroll-behavior:contain;
    padding:8px 10px 24px;
    scrollbar-width:thin;scrollbar-color:var(--line) transparent;
  }
  .list::-webkit-scrollbar{width:9px}
  .list::-webkit-scrollbar-thumb{background:var(--line);border-radius:9px;border:2px solid var(--ink-1)}

  .cat{margin-top:14px}
  .cat:first-child{margin-top:4px}
  .cat-label{
    display:flex;align-items:center;gap:8px;
    padding:6px 10px;
    font-size:10.5px;font-weight:500;letter-spacing:.11em;text-transform:uppercase;
    color:var(--fg-mute);
  }
  .cat-label .count{
    margin-left:auto;color:var(--fg-mute);opacity:.75;font-size:10px;
  }

  .item{
    display:block;width:100%;text-align:left;
    padding:9px 11px 9px 13px;
    background:none;border:0;border-radius:8px;
    position:relative;color:var(--fg);
    transition:background .12s;
  }
  .item + .item{margin-top:1px}
  .item:hover{background:var(--ink-2)}
  .item:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}
  .item .t{
    font-size:13px;font-weight:500;line-height:1.35;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }
  .item .f{
    font-size:10.5px;color:var(--fg-mute);margin-top:3px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .item.active{background:var(--ink-2)}
  .item.active::before{
    content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;
    background:var(--accent);border-radius:0 3px 3px 0;
  }
  .item.active .t{color:var(--accent)}

  .side-foot{
    padding:11px 18px;border-top:1px solid var(--line-soft);
    font-size:11px;color:var(--fg-mute);
    display:flex;align-items:center;justify-content:space-between;gap:10px;
  }
  .side-foot a{color:var(--fg-dim);text-decoration:none}
  .side-foot a:hover{color:var(--accent)}

  /* ---------------- Main ---------------- */
  .main{grid-column:2;display:flex;flex-direction:column;min-width:0;min-height:0;background:var(--ink)}
  .topbar{
    height:var(--topbar-h);flex:none;
    display:flex;align-items:center;gap:12px;
    padding:0 16px;border-bottom:1px solid var(--line);
    background:var(--ink-1);
  }
  .hamburger{
    display:none;border:1px solid var(--line);background:var(--ink);
    width:38px;height:38px;border-radius:8px;place-items:center;flex:none;
  }
  .hamburger svg{width:18px;height:18px}
  .now{min-width:0;flex:1}
  .now .n-title{
    font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:15px;letter-spacing:-.01em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;
  }
  .now .n-tag{
    font-size:10.5px;color:var(--fg-mute);letter-spacing:.05em;text-transform:uppercase;margin-top:1px;
  }
  .tools{display:flex;align-items:center;gap:8px;flex:none}

  .nav-btn{
    width:36px;height:36px;border-radius:8px;border:1px solid var(--line);
    background:var(--ink);display:grid;place-items:center;color:var(--fg-dim);
    transition:.12s;
  }
  .nav-btn:hover:not(:disabled){color:var(--fg);border-color:var(--fg-mute)}
  .nav-btn:disabled{opacity:.35;cursor:default}
  .nav-btn svg{width:16px;height:16px}

  .toggle{
    display:flex;background:var(--ink);border:1px solid var(--line);border-radius:8px;padding:2px;gap:2px;
  }
  .toggle button{
    border:0;background:none;color:var(--fg-dim);font-size:12px;font-weight:500;
    padding:6px 11px;border-radius:6px;display:flex;align-items:center;gap:6px;transition:.12s;
  }
  .toggle button svg{width:14px;height:14px}
  .toggle button:hover{color:var(--fg)}
  .toggle button.on{background:var(--ink-3);color:var(--fg)}
  .toggle button.on svg{color:var(--accent)}

  .act{
    height:36px;padding:0 12px;border-radius:8px;border:1px solid var(--line);
    background:var(--ink);color:var(--fg-dim);font-size:12px;font-weight:500;
    display:inline-flex;align-items:center;gap:7px;transition:.12s;text-decoration:none;
  }
  .act:hover{color:var(--fg);border-color:var(--fg-mute)}
  .act svg{width:14px;height:14px}
  .act.primary{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);font-weight:600}
  .act.primary:hover{filter:brightness(1.05)}

  /* ---------------- Viewer ---------------- */
  .stage{flex:1;min-height:0;background:var(--paper);position:relative}
  .stage iframe{width:100%;height:100%;border:0;display:block}

  /* stacked "read all" */
  .stack{position:absolute;inset:0;overflow-y:auto;background:var(--ink);padding:16px}
  .stack::-webkit-scrollbar{width:12px}
  .stack::-webkit-scrollbar-thumb{background:var(--line);border-radius:12px;border:3px solid var(--ink)}
  .doc{
    max-width:1000px;margin:0 auto 16px;
    background:var(--ink-1);border:1px solid var(--line);border-radius:12px;overflow:hidden;
    box-shadow:0 10px 30px -18px rgba(0,0,0,.6);
  }
  .doc-head{
    display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--line);
  }
  .doc-num{
    font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--accent);
    background:var(--accent-dim);border:1px solid var(--accent-line);
    padding:2px 7px;border-radius:6px;flex:none;
  }
  .doc-head .dt{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:14px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .doc-head .da{margin-left:auto;flex:none;display:flex;gap:6px}
  .doc-head .da a{
    color:var(--fg-mute);border:1px solid var(--line);border-radius:6px;
    width:30px;height:30px;display:grid;place-items:center;text-decoration:none;transition:.12s;
  }
  .doc-head .da a:hover{color:var(--fg);border-color:var(--fg-mute)}
  .doc-head .da svg{width:14px;height:14px}
  .doc-frame{height:82vh;background:var(--paper)}
  .doc-frame iframe{width:100%;height:100%;border:0;display:block}
  .doc-frame .ph{
    height:100%;display:grid;place-items:center;color:var(--fg-mute);font-size:12px;
    background:var(--ink-1);gap:8px;text-align:center;
  }
  .doc-frame .ph .spin{width:22px;height:22px}

  /* empty / message states */
  .msg{
    position:absolute;inset:0;display:grid;place-items:center;padding:32px;background:var(--ink);
  }
  .msg-inner{max-width:440px;text-align:center;color:var(--fg-dim)}
  .msg-inner .ico{
    width:52px;height:52px;margin:0 auto 16px;border-radius:12px;
    background:var(--ink-2);border:1px solid var(--line);display:grid;place-items:center;color:var(--fg-mute);
  }
  .msg-inner .ico svg{width:24px;height:24px}
  .msg-inner h2{font-family:"Space Grotesk",sans-serif;color:var(--fg);font-size:18px;margin:0 0 8px}
  .msg-inner p{font-size:13px;line-height:1.6;margin:0 0 6px}
  .msg-inner code{
    font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--accent);
    background:var(--accent-dim);padding:1px 6px;border-radius:5px;
  }

  .spin{
    border:2.5px solid var(--line);border-top-color:var(--accent);border-radius:50%;
    width:26px;height:26px;animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  .scrim{
    display:none;position:fixed;inset:0;background:rgba(8,10,14,.6);
    backdrop-filter:blur(2px);z-index:35;
  }

  /* ---------------- Responsive ---------------- */
  @media (max-width:820px){
    .app{grid-template-columns:1fr}
    .side{
      position:fixed;left:0;top:0;bottom:0;width:min(88vw,var(--sidebar-w));
      transform:translateX(-100%);transition:transform .22s ease;
    }
    body.nav-open .side{transform:none}
    body.nav-open .scrim{display:block}
    .main{grid-column:1}
    .hamburger{display:grid}
    .doc-frame{height:74vh}
    .tools .lbl{display:none}
    .act .lbl{display:none}
    .act{padding:0 10px}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none!important;animation-duration:.001ms!important}
    .side{transition:none}
  }
</style>
</head>
<body>
<div class="scrim" id="scrim"></div>

<div class="app">
  <!-- Sidebar -->
  <aside class="side" id="side">
    <div class="brand">
      <div class="brand-row">
        <div class="mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="#34D399" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
        </div>
        <div>
          <h1 id="siteTitle">QA Study Library</h1>
          <div class="sub" id="tagline">Viva &amp; interview prep</div>
        </div>
      </div>
      <div class="status" id="status">
        <span class="dot"></span>
        <span class="mono" id="statusText">loading…</span>
      </div>
    </div>

    <div class="search">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="search" type="text" placeholder="Search guides…" autocomplete="off" spellcheck="false" />
        <button class="clear-x" id="clearSearch" aria-label="Clear search">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
    </div>

    <nav class="list" id="list" aria-label="Documents"></nav>

    <div class="side-foot">
      <span class="mono" id="footCount">—</span>
      <a href="#" id="downloadAllHint" title="Tip">read anywhere</a>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <button class="hamburger" id="hamburger" aria-label="Open menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>

      <div class="now">
        <div class="n-title" id="nowTitle">Loading…</div>
        <div class="n-tag" id="nowTag"></div>
      </div>

      <div class="tools">
        <button class="nav-btn" id="prevBtn" title="Previous (←)" aria-label="Previous">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <button class="nav-btn" id="nextBtn" title="Next (→)" aria-label="Next">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>

        <div class="toggle" role="tablist" aria-label="View mode">
          <button id="modeSingle" class="on" role="tab" aria-selected="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="2"/></svg>
            <span class="lbl">Read one</span>
          </button>
          <button id="modeAll" role="tab" aria-selected="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="7" rx="1.5"/><rect x="4" y="14" width="16" height="7" rx="1.5"/></svg>
            <span class="lbl">Read all</span>
          </button>
        </div>

        <a class="act" id="openTab" href="#" target="_blank" rel="noopener" title="Open in new tab">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
          <span class="lbl">Open</span>
        </a>
        <a class="act primary" id="downloadBtn" href="#" download title="Download PDF">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
          <span class="lbl">Download</span>
        </a>
      </div>
    </div>

    <div class="stage" id="stage">
      <div class="msg" id="bootMsg">
        <div class="msg-inner">
          <div class="spin" style="margin:0 auto 14px"></div>
          <p>Finding your PDFs…</p>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
(function(){
  "use strict";

  /* ---------- helpers ---------- */
  const $ = (s,el=document)=>el.querySelector(s);
  const create=(tag,cls)=>{const e=document.createElement(tag);if(cls)e.className=cls;return e;};

  function prettify(name){
    let t=name.replace(/\.pdf$/i,"");
    t=t.replace(/^\d+[_\-\s]+/,"");          // drop leading "1_" "2-" etc.
    t=t.replace(/[_\-]+/g," ").replace(/\s+/g," ").trim();
    // tidy some common tokens
    t=t.replace(/\bcv\b/i,"CV").replace(/\bctfl\b/i,"CTFL").replace(/\bistqb\b/i,"ISTQB")
       .replace(/\bsqa\b/i,"SQA").replace(/\bdsa\b/i,"DSA").replace(/\bcicd\b/i,"CI/CD")
       .replace(/\bapi\b/i,"API").replace(/\bjmeter\b/i,"JMeter").replace(/\bA To Z\b/i,"A-to-Z");
    // Title-case words that are all-lowercase
    t=t.split(" ").map(w=>/^[a-z]/.test(w)?w.charAt(0).toUpperCase()+w.slice(1):w).join(" ");
    return t;
  }

  // Category rules — order matters (first match wins).
  const CATS=[
    {key:"career",   label:"Résumé & Career",       test:/cv|resume|r[eé]sum/i},
    {key:"prog",     label:"Programming & DSA",      test:/dsa|python|rust|algorithm|data[_\- ]?struct|handbook|scratch/i},
    {key:"tools",    label:"Tools & Automation",     test:/selenium|playwright|jmeter|api[_\- ]?test|cicd|ci[_\- ]?cd|\bgit\b|postman|appium|documentation|performance/i},
    {key:"theory",   label:"SQA & Testing Theory",   test:/sqa|istqb|ctfl|methodolog|theory|quality|manual/i},
    {key:"other",    label:"Other Guides",           test:/.*/}
  ];
  function categorize(name){
    for(const c of CATS){ if(c.test.test(name)) return c; }
    return CATS[CATS.length-1];
  }

  /* ---------- state ---------- */
  const state={ docs:[], flat:[], activeFile:null, mode:"single" };

  /* ---------- source resolution ---------- */
  function detectRepo(){
    if(CONFIG.owner && CONFIG.repo) return {owner:CONFIG.owner, repo:CONFIG.repo};
    const host=location.hostname;             // e.g. abrar.github.io
    if(!host.endsWith("github.io")) return null;
    const owner=host.split(".")[0];
    const seg=location.pathname.split("/").filter(Boolean);
    // user/org page -> repo is "owner.github.io"; project page -> first path segment
    const repo=(seg.length && seg[0].toLowerCase()!=="index.html") ? seg[0] : host;
    return {owner, repo};
  }

  async function fetchRepoPdfs(){
    const info=detectRepo();
    if(!info) throw new Error("not github pages");
    const cacheKey="qa-lib:"+info.owner+"/"+info.repo+"/"+(CONFIG.pdfDir||"");
    try{
      const cached=sessionStorage.getItem(cacheKey);
      if(cached) return JSON.parse(cached);
    }catch(e){}
    const dir=CONFIG.pdfDir? "/"+CONFIG.pdfDir.replace(/^\/|\/$/g,"") : "";
    const url=`https://api.github.com/repos/${info.owner}/${info.repo}/contents${dir}`;
    const res=await fetch(url,{headers:{Accept:"application/vnd.github+json"}});
    if(!res.ok) throw new Error("github api "+res.status);
    const data=await res.json();
    if(!Array.isArray(data)) throw new Error("bad listing");
    const pdfs=data.filter(f=>f.type==="file" && /\.pdf$/i.test(f.name))
                   .map(f=>f.name).sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));
    if(!pdfs.length) throw new Error("no pdfs in repo");
    try{sessionStorage.setItem(cacheKey,JSON.stringify(pdfs));}catch(e){}
    return pdfs;
  }

  function hrefFor(name){
    const base=CONFIG.pdfDir? CONFIG.pdfDir.replace(/^\/|\/$/g,"")+"/" : "";
    return base+encodeURIComponent(name);
  }

  /* ---------- build doc model ---------- */
  function buildModel(names){
    const map=new Map();
    CATS.forEach(c=>map.set(c.key,{label:c.label,items:[]}));
    names.forEach(name=>{
      const c=categorize(name);
      map.get(c.key).items.push({file:name, title:prettify(name), href:hrefFor(name), cat:c.label});
    });
    const groups=[];
    CATS.forEach(c=>{ const g=map.get(c.key); if(g.items.length) groups.push(g); });
    state.docs=groups;
    state.flat=groups.flatMap(g=>g.items);
  }

  /* ---------- render sidebar ---------- */
  function renderList(filter=""){
    const listEl=$("#list");
    listEl.innerHTML="";
    const q=filter.trim().toLowerCase();
    let shown=0;
    state.docs.forEach(group=>{
      const items=group.items.filter(it=>!q || it.title.toLowerCase().includes(q) || it.file.toLowerCase().includes(q));
      if(!items.length) return;
      const sec=create("div","cat");
      const head=create("div","cat-label");
      head.innerHTML=`<span>${group.label}</span><span class="count mono">${items.length}</span>`;
      sec.appendChild(head);
      items.forEach(it=>{
        shown++;
        const b=create("button","item");
        b.type="button";
        b.dataset.file=it.file;
        if(it.file===state.activeFile) b.classList.add("active");
        b.innerHTML=`<div class="t">${escapeHtml(it.title)}</div><div class="f mono">${escapeHtml(it.file)}</div>`;
        b.addEventListener("click",()=>{ openDoc(it.file); closeNav(); });
        sec.appendChild(b);
      });
      listEl.appendChild(sec);
    });
    if(!shown){
      const none=create("div","cat-label");
      none.style.padding="18px 12px";
      none.style.color="var(--fg-mute)";
      none.textContent=q? `No guides match “${filter}”.` : "No guides yet.";
      listEl.appendChild(none);
    }
  }

  function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

  function markActive(){
    document.querySelectorAll(".item").forEach(el=>{
      el.classList.toggle("active", el.dataset.file===state.activeFile);
    });
  }

  /* ---------- viewer ---------- */
  function currentIndex(){ return state.flat.findIndex(d=>d.file===state.activeFile); }

  function updateTopbar(doc){
    $("#nowTitle").textContent=doc? doc.title : "—";
    $("#nowTag").textContent=doc? doc.cat : "";
    $("#openTab").href=doc? doc.href : "#";
    $("#downloadBtn").href=doc? doc.href : "#";
    const i=currentIndex();
    $("#prevBtn").disabled=(i<=0);
    $("#nextBtn").disabled=(i<0 || i>=state.flat.length-1);
  }

  function openDoc(file){
    const doc=state.flat.find(d=>d.file===file) || state.flat[0];
    if(!doc) return;
    state.activeFile=doc.file;
    if(state.mode==="all"){ state.mode="single"; syncModeButtons(); }
    renderSingle(doc);
    markActive();
    updateTopbar(doc);
    try{ history.replaceState(null,"","#file="+encodeURIComponent(doc.file)); }catch(e){}
    // scroll active item into view in sidebar
    const el=document.querySelector('.item[data-file="'+CSS.escape(doc.file)+'"]');
    if(el) el.scrollIntoView({block:"nearest"});
  }

  function renderSingle(doc){
    const stage=$("#stage");
    stage.innerHTML="";
    const frame=create("iframe");
    frame.title=doc.title;
    frame.src=doc.href+"#toolbar=1&view=FitH";
    stage.appendChild(frame);
  }

  let io=null;
  function renderAll(){
    const stage=$("#stage");
    stage.innerHTML="";
    if(io){io.disconnect();io=null;}
    const wrap=create("div","stack");
    state.flat.forEach((doc,idx)=>{
      const card=create("div","doc");
      card.id="doc-"+idx;
      const head=create("div","doc-head");
      head.innerHTML=
        `<span class="doc-num">${String(idx+1).padStart(2,"0")}</span>`+
        `<span class="dt">${escapeHtml(doc.title)}</span>`+
        `<span class="da">`+
          `<a href="${doc.href}" target="_blank" rel="noopener" title="Open in new tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg></a>`+
          `<a href="${doc.href}" download title="Download"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg></a>`+
        `</span>`;
      const fr=create("div","doc-frame");
      fr.dataset.href=doc.href;
      fr.innerHTML=`<div class="ph"><span class="spin"></span><span>Loads when you scroll here</span></div>`;
      card.appendChild(head);
      card.appendChild(fr);
      wrap.appendChild(card);
    });
    stage.appendChild(wrap);

    // lazy-load iframes as they scroll into view (keeps 15 PDFs from loading at once)
    io=new IntersectionObserver((entries)=>{
      entries.forEach(e=>{
        if(e.isIntersecting){
          const fr=e.target;
          if(!fr.dataset.loaded){
            fr.dataset.loaded="1";
            const ifr=create("iframe");
            ifr.src=fr.dataset.href+"#toolbar=1&view=FitH";
            fr.innerHTML="";
            fr.appendChild(ifr);
          }
        }
      });
    },{root:wrap,rootMargin:"600px 0px"});
    wrap.querySelectorAll(".doc-frame").forEach(fr=>io.observe(fr));
  }

  function syncModeButtons(){
    $("#modeSingle").classList.toggle("on",state.mode==="single");
    $("#modeSingle").setAttribute("aria-selected",state.mode==="single");
    $("#modeAll").classList.toggle("on",state.mode==="all");
    $("#modeAll").setAttribute("aria-selected",state.mode==="all");
  }

  function setMode(mode){
    if(mode===state.mode) return;
    state.mode=mode;
    syncModeButtons();
    if(mode==="all"){ renderAll(); $("#nowTitle").textContent="All guides"; $("#nowTag").textContent=state.flat.length+" documents"; }
    else{ const d=state.flat.find(x=>x.file===state.activeFile)||state.flat[0]; if(d) openDoc(d.file); }
  }

  function step(delta){
    const i=currentIndex();
    const n=i<0?0:i+delta;
    if(n>=0 && n<state.flat.length) openDoc(state.flat[n].file);
  }

  /* ---------- nav drawer (mobile) ---------- */
  function openNav(){document.body.classList.add("nav-open");}
  function closeNav(){document.body.classList.remove("nav-open");}

  /* ---------- boot ---------- */
  function showEmptyMessage(){
    $("#stage").innerHTML=
      `<div class="msg"><div class="msg-inner">
        <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg></div>
        <h2>No PDFs found</h2>
        <p>Add your <code>.pdf</code> files to this repository (next to <code>index.html</code>), commit, and refresh.</p>
        <p style="margin-top:10px;color:var(--fg-mute)">The list updates itself once the files are in the repo.</p>
      </div></div>`;
    $("#statusText").textContent="0 guides";
    $("#status").classList.add("err");
    $("#nowTitle").textContent="No PDFs found";
    $("#nowTag").textContent="";
  }

  async function init(){
    $("#siteTitle").textContent=CONFIG.siteTitle||"PDF Library";
    document.title=CONFIG.siteTitle||"PDF Library";
    $("#tagline").textContent=CONFIG.tagline||"";

    let names=[], sourceLabel="";
    try{
      names=await fetchRepoPdfs();
      sourceLabel="auto";
    }catch(err){
      names=(CONFIG.manualList||[]).slice();
      sourceLabel="list";
    }

    if(!names.length){ showEmptyMessage(); return; }

    buildModel(names);
    renderList("");

    const total=state.flat.length;
    $("#statusText").textContent=total+" guide"+(total!==1?"s":"")+" · "+(sourceLabel==="auto"?"auto-synced":"ready");
    $("#footCount").textContent=total+" files";

    // deep-link support
    let start=state.flat[0].file;
    const m=location.hash.match(/file=([^&]+)/);
    if(m){ const want=decodeURIComponent(m[1]); if(state.flat.some(d=>d.file===want)) start=want; }
    state.activeFile=start;
    $("#stage").innerHTML="";
    openDoc(start);
  }

  /* ---------- events ---------- */
  $("#search").addEventListener("input",e=>{
    renderList(e.target.value);
    $("#clearSearch").classList.toggle("on",!!e.target.value);
  });
  $("#clearSearch").addEventListener("click",()=>{
    const s=$("#search"); s.value=""; s.focus();
    renderList(""); $("#clearSearch").classList.remove("on");
  });
  $("#modeSingle").addEventListener("click",()=>setMode("single"));
  $("#modeAll").addEventListener("click",()=>setMode("all"));
  $("#prevBtn").addEventListener("click",()=>step(-1));
  $("#nextBtn").addEventListener("click",()=>step(1));
  $("#hamburger").addEventListener("click",openNav);
  $("#scrim").addEventListener("click",closeNav);

  document.addEventListener("keydown",e=>{
    if(e.target.tagName==="INPUT") { if(e.key==="Escape"){e.target.blur();} return; }
    if(e.key==="Escape") closeNav();
    if(state.mode!=="single") return;
    if(e.key==="ArrowLeft"){ step(-1); }
    if(e.key==="ArrowRight"){ step(1); }
  });

  init();
})();
</script>
</body>
</html>
