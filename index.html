<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QA Study Library</title>
<meta name="description" content="A reading room for QA & software-testing study guides." />

<!-- ============================================================================
     QA STUDY LIBRARY  —  single-file reading room
     ----------------------------------------------------------------------------
     HOW TO ADD A PDF:  drop the .pdf file into the  /pdfs  folder and push.
     That's it. You never edit this file. The list rebuilds itself.

     The only block you might ever touch is CONFIG just below (title/tagline).
     ============================================================================ -->
<script>
  const CONFIG = {
    siteTitle: "QA Study Library",
    tagline:   "Viva & interview prep",

    // Folder that holds the PDFs (relative to this file). Keep as "pdfs".
    pdfDir: "pdfs",

    // Leave blank — auto-detected from the GitHub Pages URL.
    owner: "",
    repo:  "",

    // Last-resort fallback list, only used if BOTH pdfs/index.json AND the
    // GitHub file-listing are unavailable (e.g. opening the file offline).
    // The GitHub Action keeps pdfs/index.json in sync automatically, so you
    // normally never touch this.
    manualList: [
      "1_SQA_Theory_and_Viva_Guide.pdf",
      "2_DSA_Master_Handbook.pdf",
      "3_Python_From_Scratch_and_DSA.pdf",
      "4_Rust_Complete_Guide.pdf",
      "API-Testing-Viva-Prep-Guide.pdf",
      "CICD-Git-Viva-Prep-Guide.pdf",
      "Database-SQL-Viva-Prep-Guide.pdf",
      "JMeter-Performance-Viva-Prep-Guide.pdf",
      "Playwright-Viva-Prep-Guide.pdf",
      "SQA-A-to-Z-Complete-Theory-Guide.pdf",
      "Selenium-Viva-Prep-Guide.pdf",
      "Software_Development_Methodologies.pdf",
      "Ultimate-Security-Testing-Interview-Guide-Vol1.pdf",
      "istqb_ctfl_prep.pdf",
      "playwright_documentation.pdf"
    ]
  };
</script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root{
    --accent:#34D399; --accent-ink:#053223; --amber:#F6C453;
    --sidebar-w:322px; --topbar-h:58px; --toolbar-h:52px; --radius:10px;
    font-synthesis:none; -webkit-text-size-adjust:100%;
  }
  /* ---- dark (default) ---- */
  html[data-theme="dark"]{
    --bg:#14171E; --panel:#1A1E27; --panel-2:#212734; --panel-3:#272E3C;
    --line:#2C3342; --line-soft:#232A36;
    --fg:#EAEDF3; --fg-dim:#9AA4B4; --fg-mute:#6B7385;
    --stage:#0F1219; --shadow:0 8px 30px rgba(0,0,0,.45);
    --accent-dim:rgba(52,211,153,.13); --accent-line:rgba(52,211,153,.32);
  }
  /* ---- light ---- */
  html[data-theme="light"]{
    --bg:#F3F4F1; --panel:#FFFFFF; --panel-2:#F6F7F5; --panel-3:#EEF0EC;
    --line:#E1E4DE; --line-soft:#ECEEE9;
    --fg:#1C2027; --fg-dim:#525A66; --fg-mute:#8A93A0;
    --stage:#E7E9E4; --shadow:0 6px 24px rgba(20,24,32,.10);
    --accent-dim:rgba(20,140,90,.12); --accent-line:rgba(20,140,90,.30);
    --accent:#0F9D63; --accent-ink:#ffffff;
  }
  @media (prefers-reduced-motion: reduce){ *{transition:none !important; animation:none !important} }

  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:var(--bg); color:var(--fg);
    font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    font-size:14px; line-height:1.5; overflow:hidden;
    transition:background .25s ease,color .25s ease;
  }
  a{color:inherit}
  ::selection{background:var(--accent-dim)}

  /* ---------- top bar ---------- */
  .topbar{
    height:var(--topbar-h); display:flex; align-items:center; gap:12px;
    padding:0 16px; border-bottom:1px solid var(--line); background:var(--panel);
    position:relative; z-index:40;
  }
  .brand{display:flex; align-items:center; gap:11px; min-width:0}
  .mark{
    width:30px;height:30px;border-radius:8px;flex:0 0 auto;
    background:linear-gradient(150deg,var(--accent),#1FA97A);
    display:grid;place-items:center;color:var(--accent-ink);
    font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:13px;
    box-shadow:0 2px 10px var(--accent-dim);
  }
  .brand h1{
    font-family:"Space Grotesk",sans-serif;font-size:16px;font-weight:600;
    margin:0;letter-spacing:-.01em;white-space:nowrap;
  }
  .brand span{display:block;font-size:11px;color:var(--fg-mute);font-weight:500;margin-top:-1px}
  .spacer{flex:1}
  .iconbtn{
    height:36px;min-width:36px;padding:0 10px;border-radius:9px;cursor:pointer;
    border:1px solid var(--line);background:var(--panel-2);color:var(--fg-dim);
    display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:500;
    font-family:inherit;transition:.15s;white-space:nowrap;
  }
  .iconbtn:hover{color:var(--fg);border-color:var(--accent-line);background:var(--panel-3)}
  .iconbtn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.9;
    stroke-linecap:round;stroke-linejoin:round;flex:0 0 auto}
  .iconbtn.on{color:var(--accent);border-color:var(--accent-line);background:var(--accent-dim)}
  .hamburger{display:none}

  /* ---------- layout ---------- */
  .layout{display:flex;height:calc(100vh - var(--topbar-h));min-height:0}

  /* ---------- sidebar ---------- */
  .sidebar{
    width:var(--sidebar-w);flex:0 0 auto;background:var(--panel);
    border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0;
    transition:transform .25s ease;
  }
  .search{padding:14px 14px 10px}
  .search-wrap{position:relative}
  .search input{
    width:100%;height:38px;padding:0 34px 0 34px;border-radius:9px;
    border:1px solid var(--line);background:var(--panel-2);color:var(--fg);
    font-family:inherit;font-size:13px;outline:none;transition:.15s;
  }
  .search input:focus{border-color:var(--accent-line);background:var(--panel-3)}
  .search input::placeholder{color:var(--fg-mute)}
  .search .mag{position:absolute;left:11px;top:50%;transform:translateY(-50%);
    width:15px;height:15px;stroke:var(--fg-mute);fill:none;stroke-width:2;pointer-events:none}
  .search .clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);
    width:22px;height:22px;border:0;background:transparent;color:var(--fg-mute);
    cursor:pointer;display:none;border-radius:6px;font-size:15px;line-height:1}
  .search .clr.on{display:grid;place-items:center}
  .search .clr:hover{color:var(--fg);background:var(--panel-3)}

  .list{flex:1;min-height:0;overflow-y:auto;padding:2px 8px 18px;scrollbar-width:thin}
  .list::-webkit-scrollbar{width:9px}
  .list::-webkit-scrollbar-thumb{background:var(--line);border-radius:9px;border:2px solid var(--panel)}
  .cat{margin:10px 6px 4px;font-family:"Space Grotesk",sans-serif;font-size:10.5px;
    font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--fg-mute)}
  .cat .n{color:var(--fg-mute);opacity:.7;font-weight:500}
  .item{
    display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;
    cursor:pointer;color:var(--fg-dim);transition:.12s;border:1px solid transparent;
  }
  .item:hover{background:var(--panel-2);color:var(--fg)}
  .item.active{background:var(--accent-dim);color:var(--fg);border-color:var(--accent-line)}
  .item.active .dot{background:var(--accent)}
  .item .dot{width:7px;height:7px;border-radius:50%;background:var(--line);flex:0 0 auto;transition:.12s}
  .item .t{font-size:12.7px;line-height:1.35;overflow:hidden;text-overflow:ellipsis;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .sidefoot{padding:11px 16px;border-top:1px solid var(--line);font-size:11px;
    color:var(--fg-mute);display:flex;justify-content:space-between;align-items:center;gap:8px}
  .sidefoot .src{display:inline-flex;align-items:center;gap:5px}
  .sidefoot .src::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent)}

  /* ---------- main / viewer ---------- */
  .main{flex:1;min-width:0;min-height:0;display:flex;flex-direction:column;background:var(--stage)}
  .toolbar{
    height:var(--toolbar-h);flex:0 0 auto;display:flex;align-items:center;gap:8px;
    padding:0 12px;border-bottom:1px solid var(--line);background:var(--panel);
  }
  .doctitle{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:13.5px;
    color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    max-width:34vw;min-width:0}
  .tgroup{display:inline-flex;align-items:center;gap:2px;background:var(--panel-2);
    border:1px solid var(--line);border-radius:9px;padding:3px}
  .tbtn{height:30px;min-width:30px;padding:0 8px;border:0;border-radius:7px;cursor:pointer;
    background:transparent;color:var(--fg-dim);display:inline-flex;align-items:center;
    justify-content:center;gap:6px;font-family:inherit;font-size:12.5px;font-weight:500;transition:.12s}
  .tbtn:hover:not(:disabled){color:var(--fg);background:var(--panel-3)}
  .tbtn:disabled{opacity:.35;cursor:default}
  .tbtn.on{color:var(--accent);background:var(--accent-dim)}
  .tbtn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.9;
    stroke-linecap:round;stroke-linejoin:round}
  .pageind{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--fg-dim);
    min-width:64px;text-align:center;user-select:none}
  .zoomind{font-family:"JetBrains Mono",monospace;font-size:11.5px;color:var(--fg-mute);
    min-width:42px;text-align:center}

  /* scroll area holding rendered pages */
  .scroll{flex:1;min-height:0;overflow:auto;-webkit-overflow-scrolling:touch;
    padding:22px 16px 40px;scrollbar-width:thin;text-align:center;scroll-behavior:smooth}
  .scroll::-webkit-scrollbar{width:11px;height:11px}
  .scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:9px;border:3px solid var(--stage)}
  .pageHolder{position:relative;background:#fff;border-radius:4px;box-shadow:var(--shadow);
    margin:0 auto 16px;display:grid;place-items:center;color:#889;overflow:hidden}
  .pageHolder .ph{font-family:"JetBrains Mono",monospace;font-size:11px;color:#8892a4}
  canvas.pageCanvas{display:block;border-radius:4px;max-width:100%}
  /* dark PDF: invert canvases when enabled */
  .scroll.invert canvas.pageCanvas{filter:invert(0.905) hue-rotate(180deg) contrast(0.94) brightness(1.02)}

  /* reading (distraction-free) tweaks handled by hiding chrome */
  body.reading .sidebar{display:none}
  body.reading .brand span{display:none}

  /* states */
  .center{min-height:100%;display:grid;place-items:center;text-align:center;padding:30px}
  .center .box{max-width:340px}
  .center .glyph{width:52px;height:52px;margin:0 auto 16px;border-radius:14px;
    background:var(--panel-2);border:1px solid var(--line);display:grid;place-items:center}
  .center .glyph svg{width:24px;height:24px;stroke:var(--fg-mute);fill:none;stroke-width:1.7}
  .center h2{font-family:"Space Grotesk",sans-serif;font-size:16px;font-weight:600;
    margin:0 0 6px;color:var(--fg)}
  .center p{margin:0;color:var(--fg-mute);font-size:13px;line-height:1.55}
  .center code{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--accent);
    background:var(--accent-dim);padding:1px 6px;border-radius:5px}
  .center .act{margin-top:16px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}

  /* top progress bar during load */
  .bar{position:absolute;left:0;top:0;height:2px;width:0;background:var(--accent);
    transition:width .2s ease,opacity .3s ease;z-index:50;box-shadow:0 0 8px var(--accent)}

  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.5);opacity:0;pointer-events:none;
    transition:.25s;z-index:30}
  .scrim.on{opacity:1;pointer-events:auto}

  /* ---------- responsive ---------- */
  @media (max-width:860px){
    .hamburger{display:inline-flex}
    .sidebar{position:fixed;top:var(--topbar-h);left:0;bottom:0;z-index:35;
      transform:translateX(-100%);box-shadow:var(--shadow)}
    .sidebar.open{transform:translateX(0)}
    .doctitle{max-width:40vw}
    .brand h1{font-size:15px}
    .toolbar{gap:6px;padding:0 8px;overflow-x:auto}
    .hide-sm{display:none}
    .scroll{padding:14px 8px 32px}
  }
</style>
</head>
<body>

<div class="bar" id="bar" style="opacity:0"></div>

<!-- top bar -->
<header class="topbar">
  <button class="iconbtn hamburger" id="hamburger" aria-label="Menu">
    <svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
  </button>
  <div class="brand">
    <div class="mark">QA</div>
    <div>
      <h1 id="siteTitle">QA Study Library</h1>
      <span id="tagline">Viva &amp; interview prep</span>
    </div>
  </div>
  <div class="spacer"></div>
  <button class="iconbtn" id="themeBtn" aria-label="Toggle theme" title="Light / dark theme">
    <svg id="themeIcon" viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
    <span class="hide-sm" id="themeLbl">Dark</span>
  </button>
</header>

<div class="layout">
  <!-- sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="search">
      <div class="search-wrap">
        <svg class="mag" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="search" type="text" placeholder="Search guides…" autocomplete="off" spellcheck="false" />
        <button class="clr" id="clrSearch" aria-label="Clear">&times;</button>
      </div>
    </div>
    <nav class="list" id="list"></nav>
    <div class="sidefoot">
      <span id="count">—</span>
      <span class="src" id="sourceLbl">loading…</span>
    </div>
  </aside>

  <!-- main -->
  <main class="main">
    <div class="toolbar" id="toolbar">
      <span class="doctitle" id="docTitle">Select a guide</span>
      <div class="spacer"></div>

      <div class="tgroup" id="pageNav">
        <button class="tbtn" id="prevPage" title="Previous page" disabled>
          <svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg></button>
        <span class="pageind" id="pageInd">— / —</span>
        <button class="tbtn" id="nextPage" title="Next page" disabled>
          <svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg></button>
      </div>

      <div class="tgroup">
        <button class="tbtn" id="zoomOut" title="Zoom out">
          <svg viewBox="0 0 24 24"><path d="M5 12h14"/></svg></button>
        <span class="zoomind" id="zoomInd">100%</span>
        <button class="tbtn" id="zoomIn" title="Zoom in">
          <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
      </div>

      <div class="tgroup">
        <button class="tbtn" id="readBtn" title="Reading mode — scroll all pages">
          <svg viewBox="0 0 24 24"><path d="M2 6s2-1.5 5-1.5S12 6 12 6v13s-2-1.2-5-1.2S2 19 2 19zM12 6s2-1.5 5-1.5S22 6 22 6v13s-2-1.2-5-1.2S12 19 12 19z"/></svg>
          <span class="hide-sm">Read</span></button>
        <button class="tbtn" id="invertBtn" title="Dark PDF (invert)">
          <svg viewBox="0 0 24 24"><path d="M12 3v18a9 9 0 0 0 0-18z"/><circle cx="12" cy="12" r="9"/></svg></button>
      </div>

      <div class="tgroup">
        <a class="tbtn" id="openTab" title="Open in browser viewer (search / print)" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24"><path d="M15 3h6v6M10 14 21 3M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg></a>
        <a class="tbtn" id="dlBtn" title="Download PDF" download>
          <svg viewBox="0 0 24 24"><path d="M12 3v12m0 0 4-4m-4 4-4-4M5 21h14"/></svg></a>
      </div>
    </div>

    <div class="scroll" id="scroll">
      <div class="center"><div class="box">
        <div class="glyph"><svg viewBox="0 0 24 24"><path d="M4 4h11l5 5v11a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1z"/><path d="M14 4v5h5"/></svg></div>
        <h2>Pick a guide to start reading</h2>
        <p>Choose any study guide from the list. Use <b>Read</b> for continuous scroll and the moon to darken the page.</p>
      </div></div>
    </div>
  </main>
</div>

<div class="scrim" id="scrim"></div>

<!-- vendored PDF.js (no CDN, works offline) -->
<script src="assets/pdfjs/pdf.min.js"></script>
<script>
(function(){
  "use strict";
  const $  = s => document.querySelector(s);
  const el = (tag,cls) => { const n=document.createElement(tag); if(cls)n.className=cls; return n; };
  const store = {
    get(k,d){ try{ const v=localStorage.getItem(k); return v==null?d:v; }catch(e){ return d; } },
    set(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
  };

  /* ---- pdf.js worker (relative → works on any Pages subpath) ---- */
  const PDFJS = window.pdfjsLib;
  if(PDFJS) PDFJS.GlobalWorkerOptions.workerSrc =
    new URL("assets/pdfjs/pdf.worker.min.js", document.baseURI).href;

  /* ---- config / titles ---- */
  document.title = CONFIG.siteTitle;
  $("#siteTitle").textContent = CONFIG.siteTitle;
  $("#tagline").textContent   = CONFIG.tagline;
  const DIR = (CONFIG.pdfDir||"").replace(/^\/|\/$/g,"");
  const pathTo = name => (DIR? DIR+"/" : "") + name;

  /* ---- categorisation ---- */
  const CAT_ORDER = ["SQA Theory","Tools & Automation","Programming & DSA","Database","Career","Other"];
  function categoryOf(fn){
    const n = fn.toLowerCase();
    if(/(?:^|[_\-\s])cv(?:$|[_\-\s.])|resume/.test(n))                       return "Career";
    if(/sql|database|\bdb[-_]/.test(n))                                      return "Database";
    if(/selenium|playwright|jmeter|api|postman|cicd|\bgit\b|performance|security|automation|newman/.test(n))
                                                                            return "Tools & Automation";
    if(/dsa|python|rust|programming|algorithm|handbook|scratch/.test(n))     return "Programming & DSA";
    if(/sqa|istqb|ctfl|theory|methodolog|sdlc|software[_-]?development/.test(n)) return "SQA Theory";
    return "Other";
  }
  function titleOf(fn){
    let s = fn.replace(/\.pdf$/i,"");
    s = s.replace(/^\d+[_\-\s.]*/,"");                 // leading number
    s = s.replace(/[_\-]+/g," ").replace(/\s+/g," ").trim();
    s = s.replace(/\bviva prep guide\b/i,"Viva Prep")
         .replace(/\binterview guide\b/i,"Interview Guide");
    return s.charAt(0).toUpperCase()+s.slice(1);
  }

  /* ---- state ---- */
  const state = { names:[], groups:[], flat:[], active:null, source:"" };
  const viewer = { doc:null, url:null, page:1, num:0, zoom:1, mode:"paged",
                   gen:0, io:null, invert:false };

  /* ---- progress bar ---- */
  const bar=$("#bar"); let barT;
  function progress(p){
    clearTimeout(barT); bar.style.opacity="1"; bar.style.width=(p*100)+"%";
    if(p>=1){ barT=setTimeout(()=>{ bar.style.opacity="0"; bar.style.width="0"; },300); }
  }

  /* ======================= file list loading ======================= */
  function detectRepo(){
    if(CONFIG.owner && CONFIG.repo) return {owner:CONFIG.owner, repo:CONFIG.repo};
    const m = location.hostname.match(/^([^.]+)\.github\.io$/i);
    if(m){
      const owner=m[1];
      const seg=location.pathname.split("/").filter(Boolean);
      const repo=seg[0] || (owner+".github.io");
      return {owner, repo};
    }
    return {owner:"", repo:""};
  }
  async function loadNames(){
    // 1) local manifest written by the GitHub Action — fast, no rate limits
    try{
      const r=await fetch(pathTo("index.json"),{cache:"no-store"});
      if(r.ok){
        const j=await r.json();
        const f=Array.isArray(j)?j:(j.files||[]);
        if(Array.isArray(f)&&f.length) return {names:f.slice(), source:"synced"};
      }
    }catch(e){}
    // 2) GitHub contents API — auto-detect straight from the repo
    try{
      const {owner,repo}=detectRepo();
      if(owner&&repo){
        const url=`https://api.github.com/repos/${owner}/${repo}/contents/${DIR}`;
        const r=await fetch(url,{headers:{Accept:"application/vnd.github+json"}});
        if(r.ok){
          const arr=await r.json();
          const f=arr.filter(x=>x.type==="file"&&/\.pdf$/i.test(x.name)).map(x=>x.name);
          if(f.length) return {names:f, source:"github"};
        }
      }
    }catch(e){}
    // 3) built-in fallback
    return {names:(CONFIG.manualList||[]).slice(), source:"builtin"};
  }

  function buildGroups(names){
    const clean=[...new Set(names.filter(n=>/\.pdf$/i.test(n)))]
      .sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));
    const map={};
    clean.forEach(fn=>{
      const c=categoryOf(fn);
      (map[c]=map[c]||[]).push({file:fn, title:titleOf(fn), cat:c});
    });
    const groups=[];
    CAT_ORDER.forEach(c=>{ if(map[c]) groups.push({cat:c, items:map[c]}); });
    Object.keys(map).forEach(c=>{ if(!CAT_ORDER.includes(c)) groups.push({cat:c, items:map[c]}); });
    const flat=[]; groups.forEach(g=>g.items.forEach(it=>flat.push(it)));
    return {groups, flat};
  }

  /* ======================= sidebar rendering ======================= */
  function renderList(filter){
    const q=(filter||"").trim().toLowerCase();
    const listEl=$("#list"); listEl.innerHTML="";
    let shown=0;
    state.groups.forEach(g=>{
      const items=g.items.filter(it=>!q ||
        it.title.toLowerCase().includes(q) || it.file.toLowerCase().includes(q));
      if(!items.length) return;
      const head=el("div","cat");
      head.innerHTML=g.cat+' <span class="n">'+items.length+'</span>';
      listEl.appendChild(head);
      items.forEach(it=>{
        const row=el("div","item"); row.dataset.file=it.file;
        if(it.file===state.active) row.classList.add("active");
        const dot=el("span","dot"); const t=el("span","t"); t.textContent=it.title;
        row.appendChild(dot); row.appendChild(t);
        row.addEventListener("click",()=>{ openDoc(it.file); if(window.innerWidth<=860) closeNav(); });
        listEl.appendChild(row); shown++;
      });
    });
    if(!shown){
      const none=el("div","cat"); none.style.color="var(--fg-mute)";
      none.textContent="No matches"; listEl.appendChild(none);
    }
  }
  function markActive(){
    document.querySelectorAll(".item").forEach(r=>
      r.classList.toggle("active", r.dataset.file===state.active));
  }

  /* ======================= viewer ======================= */
  function contentWidth(){
    const area=$("#scroll").clientWidth || 800;
    return Math.max(280, Math.min(area-32, 980));
  }
  function centerMsg(html){ $("#scroll").innerHTML='<div class="center"><div class="box">'+html+'</div></div>'; }

  async function openDoc(file){
    if(!file) return;
    state.active=file; markActive();
    const it=state.flat.find(x=>x.file===file);
    $("#docTitle").textContent = it? it.title : file;
    const url=pathTo(file);
    viewer.url=url;
    $("#openTab").href=url; $("#dlBtn").href=url; $("#dlBtn").setAttribute("download",file);
    store.set("qa:last", file);
    if(!PDFJS){ // library failed to load → graceful fallback to browser viewer
      centerMsg('<div class="glyph"><svg viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/></svg></div>'+
        '<h2>Viewer unavailable</h2><p>Open this guide directly in your browser instead.</p>'+
        '<div class="act"><a class="iconbtn on" href="'+url+'" target="_blank" rel="noopener">Open PDF</a></div>');
      return;
    }
    const gen=++viewer.gen;
    progress(0.15);
    centerMsg('<div class="glyph"><svg viewBox="0 0 24 24"><path d="M12 3v4M12 17v4M5 12H1m22 0h-4M6.3 6.3 3.5 3.5m17 17-2.8-2.8"/></svg></div><h2>Loading…</h2><p>'+(it?it.title:file)+'</p>');
    try{
      const task=PDFJS.getDocument({url, disableAutoFetch:false});
      task.onProgress=d=>{ if(d.total) progress(0.15+0.7*(d.loaded/d.total)); };
      const doc=await task.promise;
      if(gen!==viewer.gen) return;              // superseded
      viewer.doc=doc; viewer.num=doc.numPages; viewer.page=1;
      progress(1);
      await paint();
      $("#scroll").scrollTop=0;
    }catch(err){
      if(gen!==viewer.gen) return;
      progress(1);
      centerMsg('<div class="glyph"><svg viewBox="0 0 24 24"><path d="M12 9v4m0 4h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg></div>'+
        '<h2>Couldn\u2019t render this PDF</h2><p>The file may be missing or still uploading. You can still open it directly.</p>'+
        '<div class="act"><a class="iconbtn on" href="'+url+'" target="_blank" rel="noopener">Open PDF</a></div>');
    }
    updateToolbar();
  }

  async function paint(){
    if(!viewer.doc) return;
    return viewer.mode==="reading" ? paintReading() : paintPaged();
  }

  async function renderInto(holder, pageNum, gen){
    const page=await viewer.doc.getPage(pageNum);
    if(gen!==viewer.gen) return;
    const vp1=page.getViewport({scale:1});
    const cssW=contentWidth()*viewer.zoom;
    const scale=cssW/vp1.width;
    const dpr=Math.min(window.devicePixelRatio||1, 2);
    const vp=page.getViewport({scale:scale*dpr});
    const cssH=vp.height/dpr;
    const canvas=el("canvas","pageCanvas");
    canvas.width=Math.floor(vp.width); canvas.height=Math.floor(vp.height);
    canvas.style.width=cssW+"px"; canvas.style.height=cssH+"px";
    holder.style.width=cssW+"px"; holder.style.height=cssH+"px";
    try{
      await page.render({canvasContext:canvas.getContext("2d",{alpha:false}), viewport:vp}).promise;
    }catch(e){ return; }
    if(gen!==viewer.gen) return;
    holder.innerHTML=""; holder.appendChild(canvas); holder.dataset.rendered="1";
  }

  async function paintPaged(){
    const gen=viewer.gen; const scroll=$("#scroll");
    scroll.onscroll=null;               // reading-mode tracker off
    scroll.innerHTML="";
    const holder=el("div","pageHolder");
    holder.innerHTML='<span class="ph">rendering…</span>';
    scroll.appendChild(holder);
    await renderInto(holder, viewer.page, gen);
    updateToolbar();
  }

  async function paintReading(){
    const gen=viewer.gen; const scroll=$("#scroll");
    scroll.innerHTML="";
    // estimate placeholder size from page 1 so scrolling is stable
    let aspect=1.414;
    try{ const p1=await viewer.doc.getPage(1); const v=p1.getViewport({scale:1}); aspect=v.height/v.width; }catch(e){}
    if(gen!==viewer.gen) return;
    const cssW=contentWidth()*viewer.zoom;
    if(viewer.io) viewer.io.disconnect();
    viewer.io=new IntersectionObserver((ents)=>{
      ents.forEach(en=>{
        if(en.isIntersecting){
          const h=en.target;
          if(!h.dataset.rendered){ renderInto(h, +h.dataset.page, gen); }
          viewer.io.unobserve(h);
        }
      });
    },{root:scroll, rootMargin:"800px 0px"});
    for(let i=1;i<=viewer.num;i++){
      const h=el("div","pageHolder"); h.dataset.page=i;
      h.style.width=cssW+"px"; h.style.height=(cssW*aspect)+"px";
      h.innerHTML='<span class="ph">'+i+'</span>';
      scroll.appendChild(h); viewer.io.observe(h);
    }
    // track current page in reading mode
    scroll.onscroll=()=>{
      if(viewer.mode!=="reading") return;
      const kids=scroll.querySelectorAll(".pageHolder");
      const mid=scroll.scrollTop+scroll.clientHeight/2;
      let cur=1;
      kids.forEach(k=>{ const pn=+k.dataset.page; if(pn && k.offsetTop<=mid) cur=pn; });
      if(cur && cur!==viewer.page){ viewer.page=cur; updateToolbar(); }
    };
    updateToolbar();
  }

  function updateToolbar(){
    const has=!!viewer.doc;
    $("#pageInd").textContent = has? (viewer.page+" / "+viewer.num) : "— / —";
    $("#zoomInd").textContent = Math.round(viewer.zoom*100)+"%";
    const paged = has && viewer.mode==="paged";
    $("#prevPage").disabled = !paged || viewer.page<=1;
    $("#nextPage").disabled = !paged || viewer.page>=viewer.num;
    $("#readBtn").classList.toggle("on", viewer.mode==="reading");
    $("#invertBtn").classList.toggle("on", viewer.invert);
    $("#scroll").classList.toggle("invert", viewer.invert);
  }

  function step(d){
    if(viewer.mode!=="paged"||!viewer.doc) return;
    const n=Math.min(Math.max(1,viewer.page+d), viewer.num);
    if(n===viewer.page) return;
    viewer.page=n; paintPaged(); $("#scroll").scrollTop=0;
  }
  function setZoom(z){
    viewer.zoom=Math.min(2.4, Math.max(0.5, +z.toFixed(2)));
    store.set("qa:zoom", viewer.zoom);
    if(viewer.doc) paint();
  }
  function setMode(m){
    if(viewer.mode===m) return;
    viewer.mode=m;
    document.body.classList.toggle("reading", m==="reading");
    store.set("qa:mode", m);
    viewer.gen++;                 // invalidate pending renders
    if(viewer.doc) paint();
    updateToolbar();
  }
  function setInvert(v){
    viewer.invert=v; store.set("qa:invert", v?"1":"0"); updateToolbar();
  }

  /* ---- theme ---- */
  function applyTheme(t){
    document.documentElement.setAttribute("data-theme",t);
    $("#themeLbl").textContent = t==="dark"?"Dark":"Light";
    $("#themeIcon").innerHTML = t==="dark"
      ? '<path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/>'
      : '<circle cx="12" cy="12" r="4.5"/><path d="M12 2v2m0 16v2M2 12h2m16 0h2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/>';
    store.set("qa:theme",t);
    // default the PDF invert to match theme, unless user has chosen explicitly
    if(store.get("qa:invert",null)===null) { viewer.invert = (t==="dark"); updateToolbar(); }
  }

  /* ---- nav (mobile) ---- */
  function openNav(){ $("#sidebar").classList.add("open"); $("#scrim").classList.add("on"); }
  function closeNav(){ $("#sidebar").classList.remove("open"); $("#scrim").classList.remove("on"); }

  /* ======================= init ======================= */
  async function init(){
    // restore prefs
    applyTheme(store.get("qa:theme","dark"));
    viewer.zoom=parseFloat(store.get("qa:zoom","1"))||1;
    viewer.mode=store.get("qa:mode","paged")==="reading"?"reading":"paged";
    document.body.classList.toggle("reading", viewer.mode==="reading");
    const inv=store.get("qa:invert",null);
    viewer.invert = inv===null ? (store.get("qa:theme","dark")==="dark") : inv==="1";
    updateToolbar();

    progress(0.1);
    const res=await loadNames();
    state.names=res.names; state.source=res.source;
    const g=buildGroups(res.names);
    state.groups=g.groups; state.flat=g.flat;
    progress(1);

    renderList("");
    $("#count").textContent = state.flat.length+" guide"+(state.flat.length===1?"":"s");
    const srcTxt = {synced:"auto-synced", github:"auto-detected", builtin:"built-in list"}[res.source]||"ready";
    $("#sourceLbl").textContent = srcTxt;

    // open deep-link, last-read, or first
    let start=null;
    const m=location.hash.match(/file=([^&]+)/);
    if(m){ const want=decodeURIComponent(m[1]); if(state.flat.some(d=>d.file===want)) start=want; }
    if(!start){ const last=store.get("qa:last",null); if(last&&state.flat.some(d=>d.file===last)) start=last; }
    if(!start && state.flat[0]) start=state.flat[0].file;
    if(start) openDoc(start); else updateToolbar();
  }

  /* ---- events ---- */
  $("#search").addEventListener("input", e=>{
    renderList(e.target.value);
    $("#clrSearch").classList.toggle("on", !!e.target.value);
  });
  $("#clrSearch").addEventListener("click", ()=>{
    const s=$("#search"); s.value=""; s.focus(); renderList(""); $("#clrSearch").classList.remove("on");
  });
  $("#prevPage").addEventListener("click", ()=>step(-1));
  $("#nextPage").addEventListener("click", ()=>step(1));
  $("#zoomIn").addEventListener("click", ()=>setZoom(viewer.zoom+0.15));
  $("#zoomOut").addEventListener("click", ()=>setZoom(viewer.zoom-0.15));
  $("#readBtn").addEventListener("click", ()=>setMode(viewer.mode==="reading"?"paged":"reading"));
  $("#invertBtn").addEventListener("click", ()=>setInvert(!viewer.invert));
  $("#themeBtn").addEventListener("click", ()=>
    applyTheme(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark"));
  $("#hamburger").addEventListener("click", openNav);
  $("#scrim").addEventListener("click", closeNav);

  let rz;
  window.addEventListener("resize", ()=>{
    clearTimeout(rz);
    rz=setTimeout(()=>{ if(viewer.doc){ viewer.gen++; paint(); } }, 220);
  });
  document.addEventListener("keydown", e=>{
    if(e.target.tagName==="INPUT"){ if(e.key==="Escape") e.target.blur(); return; }
    if(e.key==="Escape") closeNav();
    if(e.key==="ArrowLeft")  step(-1);
    if(e.key==="ArrowRight") step(1);
    if(e.key==="+"||e.key==="=") setZoom(viewer.zoom+0.15);
    if(e.key==="-") setZoom(viewer.zoom-0.15);
    if(e.key==="r"||e.key==="R") setMode(viewer.mode==="reading"?"paged":"reading");
  });

  init();
})();
</script>
</body>
</html>
